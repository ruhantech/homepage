server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hashed bundles are content-addressed, so they can be cached indefinitely.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Client-side routing: unknown paths are handled by the SPA, not nginx.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
